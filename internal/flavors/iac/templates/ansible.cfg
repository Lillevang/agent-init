[defaults]
inventory       = ansible/inventory/hosts.yml
roles_path      = ansible/roles
collections_path = ~/.ansible/collections
retry_files_enabled = False
stdout_callback = yaml
interpreter_python = auto_silent

# DEV ONLY. Turn this back on (or remove the line) for any real run against
# untrusted networks. host_key_checking=False trades MITM protection for
# convenience and is appropriate ONLY for ephemeral lab targets.
host_key_checking = False

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
