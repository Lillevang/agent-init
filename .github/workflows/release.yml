name: Release

# Releases are tag-driven (see docs/engine/releases.md). Pushing a semver tag
# (v*) cuts a public GitHub Release; pushes/merges to main run the check + build
# jobs as CI only and never publish. The release job is gated on the tag ref and
# is the sole holder of `contents: write`.
on:
  push:
    branches:
      - main
    tags:
      - "v*"

# Default to read-only. The release job opts up to `contents: write` itself, so
# the check and build jobs that also run on main pushes stay least-privilege.
permissions:
  contents: read

# Serialize per ref so a main push and a tag push don't cancel or queue behind
# each other. Don't cancel in-progress release runs.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up check environment
        uses: ./.github/actions/setup

      - name: Run done gate
        run: just check

  build:
    name: Build
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          base="agent-init-${GOOS}-${GOARCH}"
          bin="${base}${{ matrix.ext }}"
          go build \
            -ldflags "-s -w -X main.commit=${GITHUB_SHA} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${bin}" ./cmd/agent-init
          if [[ "${GOOS}" == "windows" ]]; then
              (cd dist && zip "${base}.zip" "${bin}")
          else
              tar -C dist -czf "dist/${base}.tar.gz" "${bin}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-init-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    # Only publish for semver tag pushes (vX.Y.Z). On main pushes the workflow
    # stops after check + build, so no release is cut.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Scoped here, not at workflow level: only the publish step needs write.
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          files=( *.tar.gz *.zip )
          sha256sum "${files[@]}" > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: agent-init ${{ github.ref_name }}
          body: |
            Release `${{ github.ref_name }}` built from `${{ github.sha }}`.

            Published binaries:
            - Linux amd64 / arm64 (`.tar.gz`)
            - macOS arm64 (`.tar.gz`)
            - Windows amd64 (`.zip`)
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
