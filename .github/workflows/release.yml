name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y tree shellcheck

      - name: Install Go tools
        run: |
          set -euo pipefail
          curl -fsSL https://golangci-lint.run/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          go install golang.org/x/tools/cmd/goimports@v0.30.0
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run done gate
        run: just check

  build:
    name: Build
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          base="agent-init-${GOOS}-${GOARCH}"
          bin="${base}${{ matrix.ext }}"
          go build \
            -ldflags "-s -w -X main.commit=${GITHUB_SHA} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${bin}" ./cmd/agent-init
          if [[ "${GOOS}" == "windows" ]]; then
              (cd dist && zip "${base}.zip" "${bin}")
          else
              tar -C dist -czf "dist/${base}.tar.gz" "${bin}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-init-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          files=( *.tar.gz *.zip )
          sha256sum "${files[@]}" > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: agent-init build ${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          body: |
            Automated build from `${{ github.sha }}`.

            Published binaries:
            - Linux amd64 / arm64 (`.tar.gz`)
            - Windows amd64 (`.zip`)
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
