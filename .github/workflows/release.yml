name: Release

# Releases are tag-driven (see docs/engine/releases.md). Pushing a semver tag
# (v*) cuts a public GitHub Release; pushes/merges to main run the check + build
# jobs as CI only and never publish. The release job is gated on the tag ref and
# is the sole holder of `contents: write`.
on:
  push:
    branches:
      - main
    tags:
      - "v*"

# Default to read-only. The release job opts up to `contents: write` itself, so
# the check and build jobs that also run on main pushes stay least-privilege.
permissions:
  contents: read

# Serialize per ref so a main push and a tag push don't cancel or queue behind
# each other. Don't cancel in-progress release runs.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up check environment
        uses: ./.github/actions/setup

      - name: Run done gate
        run: just check

  build:
    name: Build
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          base="agent-init-${GOOS}-${GOARCH}"
          bin="${base}${{ matrix.ext }}"
          go build \
            -ldflags "-s -w -X main.version=${{ github.ref_name }} -X main.commit=${GITHUB_SHA} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${bin}" ./cmd/agent-init
          if [[ "${GOOS}" == "windows" ]]; then
              (cd dist && zip "${base}.zip" "${bin}")
          else
              tar -C dist -czf "dist/${base}.tar.gz" "${bin}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-init-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    # Only publish for semver tag pushes (vX.Y.Z). On main pushes the workflow
    # stops after check + build, so no release is cut.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Scoped here, not at workflow level: only the publish step needs write.
    # id-token/attestations are required by attest-build-provenance to mint a
    # signed SLSA provenance statement; they stay confined to this tag-gated job.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          files=( *.tar.gz *.zip )
          sha256sum "${files[@]}" > checksums.txt

      # Attest the exact archives we publish, before the release is cut, so a
      # consumer can run `gh attestation verify <file> --repo Lillevang/agent-init`
      # against any downloaded asset. The subject is the archive set, not the
      # checksums file, which only proves integrity against itself.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: agent-init ${{ github.ref_name }}
          body: |
            Release `${{ github.ref_name }}` built from `${{ github.sha }}`.

            Published binaries:
            - Linux amd64 / arm64 (`.tar.gz`)
            - macOS arm64 (`.tar.gz`)
            - Windows amd64 (`.zip`)

            Each archive carries a signed build provenance attestation. Verify a
            download with:

            ```bash
            gh attestation verify <file> --repo Lillevang/agent-init
            ```
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
