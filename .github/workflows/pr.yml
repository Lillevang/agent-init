name: PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

# Cancel an in-progress run when a new commit is pushed to the same PR.
concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up check environment
        uses: ./.github/actions/setup

      # Run hygiene + commit-stage hooks (trailing whitespace, EOF newlines,
      # private-key check, gofmt, goimports). Catches anything that bypassed
      # local pre-commit (uninstalled hooks, --no-verify, etc.). The pre-push
      # `check` hook is excluded — `just check` runs as the next step.
      # PR-only by design: the release path does not run pre-commit.
      - name: Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

      - name: Run done gate
        run: just check
